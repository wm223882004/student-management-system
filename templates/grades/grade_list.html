{% extends 'base.html' %}

{% block title %}成绩列表 - 学生管理系统{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-clipboard-data"></i> 成绩管理</h2>
    <div>
        <a href="{% url 'grade_add' %}" class="btn btn-warning">
            <i class="bi bi-plus-circle"></i> 添加成绩
        </a>
        <a href="{% url 'grade_statistics' %}" class="btn btn-secondary">
            <i class="bi bi-bar-chart"></i> 成绩统计
        </a>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>学生</th>
                <th>学号</th>
                <th>课程</th>
                <th>成绩</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for grade in grades %}
            <tr>
                <td>{{ grade.student.name }}</td>
                <td>{{ grade.student.student_id }}</td>
                <td>{{ grade.course.name }}</td>
                <td>
                    <span class="badge {% if grade.score >= 60 %}bg-success{% else %}bg-danger{% endif %}">
                        {{ grade.score }}
                    </span>
                </td>
                <td>
                    <a href="{% url 'grade_edit' grade.pk %}" class="btn btn-sm btn-warning">编辑</a>
                    <a href="{% url 'grade_delete' grade.pk %}" class="btn btn-sm btn-danger">删除</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center">暂无数据</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
