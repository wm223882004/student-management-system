{% extends 'base.html' %}

{% block title %}{{ action }}成绩 - 学生管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-{% if action == '添加' %}warning{% else %}warning{% endif %} text-white">
                <h4><i class="bi bi-clipboard-data"></i> {{ action }}成绩</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">学生</label>
                        {{ form.student }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">课程</label>
                        {{ form.course }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">成绩</label>
                        {{ form.score }}
                    </div>
                    <button type="submit" class="btn btn-warning">保存</button>
                    <a href="{% url 'grade_list' %}" class="btn btn-secondary">返回</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
