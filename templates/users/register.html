{% extends 'base.html' %}

{% block title %}注册 - 学生管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
                <h4><i class="bi bi-person-plus"></i> 注册</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        {{ form.email }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        {{ form.password }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认密码</label>
                        {{ form.password }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">角色</label>
                        {{ form.role }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        {{ form.phone }}
                    </div>
                    <button type="submit" class="btn btn-success w-100">注册</button>
                </form>
                <div class="text-center mt-3">
                    <p>已有账号？<a href="{% url 'login' %}">立即登录</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
