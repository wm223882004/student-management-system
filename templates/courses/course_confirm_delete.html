{% extends 'base.html' %}

{% block title %}删除确认 - 学生管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4><i class="bi bi-exclamation-triangle"></i> 确认删除</h4>
            </div>
            <div class="card-body text-center">
                <p>确定要删除课程 <strong>{{ course.name }}</strong> 吗？</p>
                <p class="text-muted">此操作不可撤销！</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">确认删除</button>
                    <a href="{% url 'course_list' %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
