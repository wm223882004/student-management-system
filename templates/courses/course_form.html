{% extends 'base.html' %}

{% block title %}{{ action }}课程 - 学生管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-{% if action == '添加' %}info{% else %}warning{% endif %} text-white">
                <h4><i class="bi bi-book"></i> {{ action }}课程</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">课程编号</label>
                        {{ form.course_id }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">课程名称</label>
                        {{ form.name }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">任课教师</label>
                        {{ form.teacher }}
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">学分</label>
                            {{ form.credit }}
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">学期</label>
                            {{ form.semester }}
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">课程描述</label>
                        {{ form.description }}
                    </div>
                    <button type="submit" class="btn btn-{% if action == '添加' %}info{% else %}warning{% endif %}">保存</button>
                    <a href="{% url 'course_list' %}" class="btn btn-secondary">返回</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
