{% extends 'base.html' %}

{% block title %}退课确认 - 学生管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4><i class="bi bi-exclamation-triangle"></i> 确认退课</h4>
            </div>
            <div class="card-body text-center">
                <p>确定要为 <strong>{{ enrollment.student.name }}</strong> 退选 <strong>{{ enrollment.course.name }}</strong> 吗？</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">确认退课</button>
                    <a href="{% url 'enrollment_list' %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
