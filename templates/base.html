<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}学生管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f5f5f5; }
        .sidebar { min-height: 100vh; background: #343a40; }
        .sidebar a { color: #fff; text-decoration: none; padding: 10px 15px; display: block; }
        .sidebar a:hover { background: #495057; }
        .sidebar a.active { background: #0d6efd; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            {% if user.is_authenticated %}
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white border-bottom border-secondary">
                    <h5><i class="bi bi-school"></i> 学生管理系统</h5>
                </div>
                <a href="{% url 'dashboard' %}"><i class="bi bi-house"></i> 首页</a>
                <a href="{% url 'student_list' %}"><i class="bi bi-people"></i> 学生管理</a>
                <a href="{% url 'teacher_list' %}"><i class="bi bi-person-badge"></i> 教师管理</a>
                <a href="{% url 'course_list' %}"><i class="bi bi-book"></i> 课程管理</a>
                <a href="{% url 'grade_list' %}"><i class="bi bi-clipboard-data"></i> 成绩管理</a>
                <a href="{% url 'enrollment_list' %}"><i class="bi bi-card-list"></i> 选课管理</a>
                <a href="{% url 'logout' %}"><i class="bi bi-box-arrow-left"></i> 退出登录</a>
            </div>
            <div class="col-md-10">
            {% else %}
            <div class="col-md-12">
            {% endif %}
                <div class="container py-4">
                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    {% endif %}
                    
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
